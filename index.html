<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <form id="quizForm" action="https://formspree.io/f/xkodoeje" method="POST">
            
            <!-- Etapa Inicial -->
            <div class="step active" id="s0">
                <h2>Nosso Momento</h2>
                <label>Para qual e-mail enviar as respostas?</label>
                <input type="email" name="_replyto" class="save" placeholder="seu-email@exemplo.com" required>
                <div class="btns">
                    <button type="button" onclick="go(1)">Começar</button>
                </div>
            </div>

            <!-- Exemplo de Etapa (Gostos Pessoais) -->
            <div class="step" id="s1">
                <h2>💖 Gostos Pessoais</h2>
                <label>Qual sua comida favorita?</label>
                <input type="text" name="comida" class="save">
                <label>Doce ou Salgado?</label>
                <input type="text" name="doce_ou_salgado" class="save">
                <div class="btns">
                    <button type="button" onclick="go(0)">Voltar</button>
                    <button type="button" onclick="go(2)">Próximo</button>
                </div>
            </div>

            <!-- Adicione mais etapas aqui seguindo o padrão -->

            <div class="step" id="sfinal">
                <h2>Finalizado!</h2>
                <p>Obrigada por responder com carinho.</p>
                <button type="submit">Enviar Respostas</button>
            </div>
        </form>
    </div>

    <script>
        function go(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('s' + n).classList.add('active');
        }

        // Salvar progresso
        document.querySelectorAll('.save').forEach(el => {
            el.value = localStorage.getItem(el.name) || '';
            el.addEventListener('input', e => localStorage.setItem(e.target.name, e.target.value));
        });
        document.getElementById('quizForm').onsubmit = () => localStorage.clear();
    </script>
</body>
</html>
